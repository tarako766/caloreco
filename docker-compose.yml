services:
  db:
    image: postgres:16-alpine
    container_name: "calreco-postgres"
    environment:
      POSTGRES_USER: calreco
      POSTGRES_PASSWORD: calreco
      POSTGRES_DB: calreco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: "calreco-redis"
    ports:
      - "6379:6379"

volumes:
  postgres_data:
